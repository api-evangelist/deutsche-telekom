- type: Features
  data:
  - MagentaBusiness CPaaS portfolio — SMS, RCS, Voice, Video, Conversational Connect, Reports, and AI Studio
    delivered in partnership with Vonage
  - GSMA Open Gateway / CAMARA-aligned Network APIs — Number Verification and Verify launched jointly with
    T-Mobile US across Germany and the United States
  - 5G network capability APIs including 5G Slices for App Developers and 5G Live Video Production reserved
    bandwidth services
  - Open Telekom Cloud — T-Systems' OpenStack-based sovereign public cloud operated from Germany, with full REST
    APIs covering compute, storage, networking, container, database, AI, and API Gateway services
  - Open Telekom Integration Platform (O28M) — open-sourced cloud-native API gateway built on Kong with the
    Jumper sidecar, Keycloak identity, and the TARDIS control plane
  - TARDIS internal developer platform with multiple control-plane APIs (Rover, Controlplane, Identity,
    Discovery, File Manager, Secret Manager, Stargate) published on GitHub as OpenAPI 3
  - Horizon event-streaming ecosystem (Galaxy, Comet, Quasar, Vortex, Cosmoparrot, Golaris) for pub/sub event
    delivery, circuit breaking, and Kafka-to-MongoDB synchronization
  - Sparrow infrastructure-network monitoring tool, K8s-Breakglass privilege-elevation operator, and the
    Das-Schiff EVPN-to-the-Host network operator
  - Scale design system — the digital design system underpinning Telekom products and Magenta-branded
    experiences
  - Wurzel — Python ETL framework for Retrieval-Augmented Generation pipelines powering Telekom's generative AI
    workloads
  - 5G Trace Visualizer for converting protocol traces into SVG sequence diagrams
  - Parent of T-Mobile US (NASDAQ: TMUS) and majority owner of T-Systems International
  - 245+ public repositories under the github.com/telekom organization with active contributions to Kubernetes,
    Cluster API, and CNCF projects
